services:
  reggraph-assistant:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 中国大陆默认加速源；海外环境可改为官方源或删除 build.args
        PYTHON_IMAGE: docker.linkos.org/library/python:3.11-slim-bookworm
        DEBIAN_MIRROR: mirrors.aliyun.com
        PYPI_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
        PYPI_TRUSTED_HOST: mirrors.aliyun.com
    image: reggraph-assistant:latest
    container_name: reggraph-assistant
    ports:
      - "${PORT:-8012}:${PORT:-8012}"
    env_file:
      - path: config/.env
        required: false
    environment:
      BIND_HOST: "0.0.0.0"
      PORT: "${PORT:-8012}"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-http://localhost:8012,http://127.0.0.1:8012}"
    volumes:
      # 目录不存在时 Docker 会自动创建；首次启动 entrypoint 会写入默认 config/.env
      - ./config:/app/config
      - ./input:/app/input
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      # 可选挂载：空目录不会破坏镜像内容（entrypoint 会从镜像备份恢复）
      - ./frontend:/app/frontend
      - ./src:/app/src
    restart: unless-stopped
